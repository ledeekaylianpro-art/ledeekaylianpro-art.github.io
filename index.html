<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kaylian - CV Netflix avec vidéos aléatoires</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet" />

<style>
  body {
    margin: 0;
    background: #141414;
    font-family: 'Montserrat', sans-serif;
    color: white;
  }

  header {
    position: relative;
    text-align: center;
    padding: 30px;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 90px;
    color: #e50914;
    letter-spacing: 6px;
    margin: 0;
  }

  header .bio {
    margin-top: 10px;
    font-weight: 400;
    font-size: 18px;
    color: #f1f1f1;
  }

  /* MENU HAMBURGER */
  .menu-container {
    position: absolute;
    top: 25px;
    right: 40px;
  }

  .hamburger {
    width: 30px;
    cursor: pointer;
  }

  .hamburger div {
    height: 4px;
    background: white;
    margin: 6px 0;
    border-radius: 2px;
    transition: 0.3s;
  }

  .dropdown {
    display: none;
    position: absolute;
    right: 0;
    top: 45px;
    background: #222;
    border-radius: 6px;
    overflow: hidden;
    min-width: 200px;
    z-index: 100;
  }

  .dropdown div {
    padding: 12px 15px;
    cursor: pointer;
  }

  .dropdown div:hover {
    background: #e50914;
  }

  .dropdown.show {
    display: block;
  }

  .cv-title {
    padding-left: 60px;
    font-weight: 800;
    font-size: 26px;
  }

  .section {
    padding: 20px 60px;
  }

  .row {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  /* CARTES */
  .card {
    position: relative;
    width: 260px;
    height: 150px;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.4s ease;
  }

  .card:hover {
    transform: scale(1.15);
    z-index: 10;
  }

  .card img,
  .card video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    top: 0;
    left: 0;
    transition: opacity 0.4s ease;
    border-radius: 8px;
  }

  .card video {
    opacity: 0;
  }

  .card.active video {
    opacity: 1;
  }

  .card.active img {
    opacity: 0;
  }

  .card span {
    position: absolute;
    bottom: 10px;
    left: 10px;
    font-weight: bold;
    font-size: 18px;
    z-index: 2;
    text-shadow: 0 0 5px rgba(0, 0, 0, 0.7);
  }

  /* MODAL NETFLIX */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
    z-index: 200;
    overflow-y: auto;
    padding: 20px;
  }

  .modal-content {
    background: #181818;
    padding: 30px;
    width: 80%;
    max-width: 800px;
    border-radius: 10px;
    position: relative;
    border: 2px solid #e50914;
    box-shadow: 0 0 20px rgba(0,0,0,0.7);
  }

  .modal-content img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 20px;
  }

  .modal-content h2 {
    margin-top: 0;
  }

  .modal-content ul {
    padding-left: 20px;
  }

  .modal-content li {
    margin-bottom: 8px;
  }

  /* CROIX FIXE DANS LE COIN DU CADRE (au-dessus de l'image) */
  .close {
    position: absolute;
    top: 20px;       
    right: 20px;     
    cursor: pointer;
    font-size: 22px;
    background: rgba(0,0,0,0.7);
    padding: 5px 10px;
    border-radius: 50%;
    z-index: 5;      
    transition: background 0.2s;
  }

  .close:hover {
    background: rgba(229,9,20,0.9);
  }

  /* FORMULAIRE DANS MODAL */
  .contact-form {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .contact-form input,
  .contact-form textarea {
    padding: 10px;
    border-radius: 6px;
    border: none;
    font-size: 16px;
  }

  .contact-form button {
    padding: 10px;
    background: #e50914;
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }

  .contact-form button:hover {
    background: #ff1c1c;
  }

  @media (max-width: 768px) {
    .section {
      padding: 20px 20px;
    }
    .row {
      justify-content: center;
    }
  }
</style>
</head>
<body>
  <header>
    <div class="menu-container">
      <div class="hamburger" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
      </div>

      <div class="dropdown" id="dropdown">
        <div onclick="showContactForm()">📞 Me contacter</div>
        <div onclick="sendMail()">✉ M'envoyer un mail</div>
        <div onclick="showCredit()">ℹ À propos</div>
      </div>
    </div>

    <h1>KAYLIAN</h1>
    <div class="bio">À la recherche de stage en informatique ou cybersécurité</div>
  </header>

  <div class="cv-title">MON CV</div>

  <!-- SECTIONS COMPETENCES / EXPERIENCES / LOISIRS (inchangées) -->
  <div class="section">
    <h2>Compétences</h2>
    <div class="row">
      <div class="card video-card">
        <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=800&q=80" alt="Travailleur" class="preview" />
        <video muted></video>
        <span>Travailleur</span>
      </div>
      <div class="card video-card">
        <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=800&q=80" alt="Esprit d'équipe" class="preview" />
        <video muted></video>
        <span>Esprit d'équipe</span>
      </div>
      <div class="card video-card">
        <img src="https://images.unsplash.com/photo-1508780709619-79562169bc64?auto=format&fit=crop&w=800&q=80" alt="Sérieux" class="preview" />
        <video muted></video>
        <span>Sérieux</span>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Expériences</h2>
    <div class="row">
      <div class="card video-card">
        <img src="https://images.unsplash.com/photo-1551836022-d5d88e9218df?auto=format&fit=crop&w=800&q=80" alt="Stage de seconde" class="preview" />
        <video muted></video>
        <span>Stage de seconde</span>
      </div>
      <div class="card video-card">
        <img src="https://images.unsplash.com/photo-1509062522246-3755977927d7?auto=format&fit=crop&w=800&q=80" alt="Projet personnel" class="preview" />
        <video muted></video>
        <span>Projet personnel</span>
      </div>
      <div class="card video-card">
        <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=800&q=80" alt="Stage de 3ème" class="preview" />
        <video muted></video>
        <span>Stage de 3ème</span>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Loisirs</h2>
    <div class="row">
      <div class="card video-card">
        <img src="https://images.unsplash.com/photo-1517649763962-0c623066013b?auto=format&fit=crop&w=800&q=80" alt="Sport" class="preview" />
        <video muted></video>
        <span>Sport</span>
      </div>
      <div class="card video-card">
        <img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?auto=format&fit=crop&w=800&q=80" alt="Musique" class="preview" />
        <video muted></video>
        <span>Musique</span>
      </div>
      <div class="card video-card">
        <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=800&q=80" alt="Informatique" class="preview" />
        <video muted></video>
        <span>Informatique</span>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal" id="modal">
    <div class="modal-content" id="modal-content">
      <span class="close" onclick="closeModal()">✖</span>

      <!-- IMAGE + ÉPISODES -->
      <img id="modal-img" src="" />
      <h2 id="modal-title"></h2>
      <p id="modal-description"></p>
      <h3>Épisodes</h3>
      <ul id="modal-episodes"></ul>

      <!-- FORMULAIRE CONTACT -->
      <form class="contact-form" id="contact-form" style="display:none;">
        <h2>Me contacter</h2>
        <input type="text" name="prenom" placeholder="Prénom" required />
        <input type="text" name="nom" placeholder="Nom" required />
        <input type="text" name="objet" placeholder="Objet de la demande" required />
        <textarea name="message" placeholder="Votre message..." rows="4"></textarea>
        <button type="submit">Envoyer</button>
      </form>
    </div>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById("dropdown").classList.toggle("show");
    }

    function sendMail() {
      window.location.href = "mailto:kaylian@email.com";
    }

    function showCredit() {
      alert("Cette page a été créée par Kaylian avec l’aide de ChatGPT 🤖🔥");
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
      document.getElementById("modal-img").style.display = "block";
      document.getElementById("modal-title").style.display = "block";
      document.getElementById("modal-description").style.display = "block";
      document.getElementById("modal-episodes").style.display = "block";
      document.getElementById("contact-form").style.display = "none";
    }

    function showContactForm() {
      document.getElementById("modal").style.display = "flex";

      document.getElementById("modal-img").style.display = "none";
      document.getElementById("modal-title").style.display = "none";
      document.getElementById("modal-description").style.display = "none";
      document.getElementById("modal-episodes").style.display = "none";

      document.getElementById("contact-form").style.display = "flex";
    }

    // VIDEOS AU SURVOL
    const videos = [
      "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm",
      "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/bee.webm",
      "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/tank.webm"
    ];

    document.querySelectorAll(".video-card").forEach((card) => {
      const video = card.querySelector("video");
      let timeout;
      card.classList.remove("active");

      card.addEventListener("mouseenter", () => {
        const randomIndex = Math.floor(Math.random() * videos.length);
        const randomVideoURL = videos[randomIndex];
        video.innerHTML = `<source src="${randomVideoURL}" type="video/webm" />`;

        timeout = setTimeout(() => {
          card.classList.add("active");
          video.play();
        }, 1500);
      });

      card.addEventListener("mouseleave", () => {
        clearTimeout(timeout);
        card.classList.remove("active");
        video.pause();
        video.currentTime = 0;
        video.innerHTML = "";
      });
    });

    // CONTENU MODAL NETFLIX
    const contentData = {
      "Travailleur": { description: "Toujours motivé, sérieux et investi dans chaque mission.", episodes: ["Épisode 1 : Motivation", "Épisode 2 : Discipline", "Épisode 3 : Réussite"] },
      "Esprit d'équipe": { description: "Capacité à collaborer efficacement en groupe.", episodes: ["Épisode 1 : Communication", "Épisode 2 : Collaboration"] },
      "Sérieux": { description: "Travail appliqué et respect des délais.", episodes: ["Épisode 1 : Organisation", "Épisode 2 : Responsabilité"] },
      "Stage de seconde": { description: "Découverte de l'entreprise Sinatek dans le 20ème arrondissement de Paris.", episodes: ["Épisode 1 : Observation", "Épisode 2 : Participation"] },
      "Projet personnel": { description: "Réalisation du jeu Flappy Bird en autonomie avec Scratch.", episodes: ["Épisode 1 : Créativité", "Épisode 2 : Apprentissage"] },
      "Stage de 3ème": { description: "Découverte de l'entreprise Agora dans le 77.", episodes: ["Épisode 1 : Découverte", "Épisode 2 : Adaptation"] },
      "Sport": { description: "Activités physiques régulières pour rester en forme.", episodes: ["Épisode 1 : Football", "Épisode 2 : Basketball", "Épisode 3 : Salle de sport"] },
      "Musique": { description: "J'écoute de la musique de temps en temps.", episodes: ["Épisode 1 : Piano", "Épisode 2 : Guitare"] },
      "Informatique": { description: "Développement web : HTML/CSS/JS et projets personnels.", episodes: ["Épisode 1 : HTML/CSS", "Épisode 2 : JavaScript", "Épisode 3 : Projets"] }
    };

    document.querySelectorAll(".card").forEach(card => {
      card.addEventListener("click", () => {
        const title = card.querySelector("span").textContent;
        const imgSrc = card.querySelector("img").src;

        document.getElementById("modal-img").src = imgSrc;
        document.getElementById("modal-title").textContent = title;
        document.getElementById("modal-description").textContent = contentData[title]?.description || "Description à venir...";

        const episodesList = document.getElementById("modal-episodes");
        episodesList.innerHTML = "";

        const episodes = contentData[title]?.episodes || ["Épisode 1 : À venir"];
        episodes.forEach(ep => {
          const li = document.createElement("li");
          li.textContent = ep;
          episodesList.appendChild(li);
        });

        document.getElementById("modal").style.display = "flex";

        document.getElementById("modal-img").style.display = "block";
        document.getElementById("modal-title").style.display = "block";
        document.getElementById("modal-description").style.display = "block";
        document.getElementById("modal-episodes").style.display = "block";
        document.getElementById("contact-form").style.display = "none";
      });
    });
  </script>
</body>
</html>
